name: Secure SFTP Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sass
        run: npm install -g sass

      - name: Compile CSS
        run: sass styles/style.scss styles/style.css

      - name: Create .env file
        run: |
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_SECURE=${{ secrets.SMTP_SECURE }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "SMTP_FROM=${{ secrets.SMTP_FROM }}" >> .env
          echo "SMTP_TO=${{ secrets.SMTP_TO }}" >> .env

      - name: Deploy to Server via lftp (Host Europe)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -e "
          set ftp:ssl-allow yes;
          set ftp:ssl-force yes;
          set ftp:ssl-protect-data yes;
          set ssl:verify-certificate no;
          set ftp:passive-mode true;
          set ftp:list-options -a;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p 21 ${{ secrets.FTP_SERVER }};
          mirror -R ./ ./ \
            --ignore-time \
            --parallel=2 \
            --exclude .git/ \
            --exclude .github/ \
            --exclude node_modules/ \
            --exclude styles/*.scss \
            --exclude .env.example \
            --exclude README.md \
            --exclude .env;
          quit
          "
