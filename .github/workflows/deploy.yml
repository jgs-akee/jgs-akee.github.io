name: Secure SFTP Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sass
        run: npm install -g sass

      - name: Compile CSS
        run: sass styles/style.scss styles/style.css

      - name: Create .env file
        run: |
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_SECURE=${{ secrets.SMTP_SECURE }}" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "SMTP_FROM=${{ secrets.SMTP_FROM }}" >> .env
          echo "SMTP_TO=${{ secrets.SMTP_TO }}" >> .env

      - name: Deploy to Server via FTP (Host Europe)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ./
          # Host Europe benötigt oft das explizite Ignorieren von Zertifikatsfehlern bei Subdomains
          # oder die Einstellung auf 'ftp' mit TLS
          security: loose 
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            styles/*.scss
            .env.example
            README.md
            .env
